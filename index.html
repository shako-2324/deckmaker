<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <title>らんだむでっきめーかー</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="menu_background">
        <ul id="menu_box">
            <label><li><input type="radio" name="menu" value="1" id="radio_menu_1">使い方</li></label>
            <label><li><input type="radio" name="menu" value="2" id="radio_menu_2">セーブ</li></label>
            <label><li><input type="radio" name="menu" value="3" id="radio_menu_3">ヒーロー</li></label>
            <label><li><input type="radio" name="menu" value="4" id="radio_menu_4">カード</li></label>
            <label><li><input type="radio" name="menu" value="5" id="radio_menu_5">生成</li></label>
        </ul>
    </div>
    <div id="menu1_id" class="contents">

        <div class="menu1_background">
            <br>
            <div class="menu1_text">
                <h1>見出し</h1>
                <h2>説明</h2>

            </div>
        </div>
    </div>

    <div id="menu2_id" class="contents">
        <div class="background">
            <input type="button" id="save_btn" value="書き出し">
            <div id="code_output">

            </div>
            <input type="text" id="load_text">
            <input type="button" id="load_btn" value="読み込み">
            <div id="code_input">

            </div>
            <div class="space"></div>
        </div>
    </div>
    <div id="menu3_id" class="contents">
        <div class="background">
            <div class="role_index">　<span class="orange_bullet">▼</span>　アタッカー</div>
            <div id="attackerlist">
            </div>
            <div class="role_index">　<span class="orange_bullet">▼</span>　ガンナー</div>
            <div id="gunnerlist">
            </div>
            <div class="role_index">　<span class="orange_bullet">▼</span>　タンク</div>
            <div id="tanklist">
            </div>
            <div class="role_index">　<span class="orange_bullet">▼</span>　スプリンター</div>
            <div id="sprinterlist">
            </div>
            <div class="btn_box">
                <input type="button" id="hero_nomal_allcheck_btn" value="一括ON:恒常">
                <input type="button" id="hero_special_allcheck_btn" value="一括ON:コラボ">
                <input type="button" id="hero_uncheck_btn" value="リセット">
            </div>
            <div class="space"></div>
        </div>
        
    </div>

                <div id="listbox_card_1"></div>
                <div id="listbox_card_1sp"></div>

                    <input type="button" class="cardtype_select_menu" value="近距離">
                    <input type="button" class="cardtype_select_menu" value="遠距離">

                <div class="btnbox_line">
                    <input type="button" class="cardtype_select_menu" value="回復">
                    <input type="button" class="cardtype_select_menu" value="ガード">
